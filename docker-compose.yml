services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: panther1257
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  app:
    build: .
    restart: always
    env_file:
    - .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: dashboard
      DB_USER: postgres
      DB_PASS: panther1257
    depends_on:
      - db
  
  nginx:
    image: nginx:latest
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
  
volumes:
  postgres_data:
